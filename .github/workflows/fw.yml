name: Auto FW (onyx from xmfirmwareupdater page)

on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          set -e
          echo "Before cleanup:"
          df -h

          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf /usr/local/share/powershell
          sudo rm -rf /usr/lib/jvm
          sudo apt-get clean

          echo "After cleanup:"
          df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml xiaomi-flashable-firmware-creator

      - name: Check latest recovery ROM links (onyx)
        id: check
        run: |
          set -e
          python scripts/onyx_check.py >> "$GITHUB_OUTPUT"

      - name: Stop if no update
        if: steps.check.outputs.has_update != 'true'
        run: echo "No new onyx update."

      - name: Build firmware zips (all regions)
        if: steps.check.outputs.has_update == 'true'
        env:
          ROMS_JSON: ${{ steps.check.outputs.roms_json }}
        run: |
          set -e
          mkdir -p out
          python scripts/onyx_build_all.py "$ROMS_JSON" out
          ls -lah out
          echo "Disk after build:"
          df -h

      - name: Create release & upload assets
        if: steps.check.outputs.has_update == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check.outputs.release_tag }}
          TITLE: ${{ steps.check.outputs.release_title }}
          NOTES_CONTENT: ${{ steps.check.outputs.release_notes }}
        run: |
          set -e
          # Delete previous release and tag if they exist
          gh release delete "$TAG" --yes || true
          git push --delete origin "$TAG" || true

          # Create fresh release
          gh release create "$TAG" out/*.zip --title "$TITLE" --notes "$NOTES_CONTENT"
          echo "release_url=$(gh release view "$TAG" --json url -q .url)" >> "$GITHUB_OUTPUT"

      - name: Telegram notify
        if: steps.check.outputs.has_update == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check.outputs.release_tag }}
        run: |
          set -e
          python3 - <<'PY'
          import json
          import os
          import subprocess
          import requests
          rel=json.loads(subprocess.check_output(["gh","release","view",os.environ["TAG"],"--json","url,assets"],text=True))
          regions=[("china","🇨🇳 China"),("eea","🇪🇺 EEA"),("global","🌍 Global"),("india","🇮🇳 India"),("indonesia","🇮🇩 Indonesia"),("russia","🇷🇺 Russia"),("taiwan","🇹🇼 Taiwan")]
          rows=[]
          
          for key,label in regions:
              for a in rel.get("assets", []):
                  file_name = a.get("name", "")
                  if file_name.lower().startswith("fw_") and key in file_name.lower():
                      download_url = a.get("browser_download_url") or a.get("url") or rel["url"]
                      
                      # Strip extension and split by underscores
                      clean_name = file_name.replace(".zip", "")
                      parts = clean_name.split("_")
                      
                      # Find the segment containing the OS version (e.g., OS3.0.303.0.WOLCNXM)
                      version_str = ""
                      for part in parts:
                          # Match OS... or V... versions (HyperOS / MIUI style)
                          if part.upper().startswith("OS") or (part.upper().startswith("V") and "." in part):
                              version_str = part
                              break
                      
                      # Fallback if no matching pattern is found
                      if not version_str:
                          version_str = parts[-2] if len(parts) >= 2 else clean_name
                          
                      # Clean button text format
                      button_text = f"{label} - {version_str}"
                      
                      rows.append([{"text": button_text, "url": download_url}])
                      break
                      
          rows.append([{"text":"🌐 GitHub Release","url":rel["url"]}])
          requests.post(f'https://api.telegram.org/bot{os.environ["TELEGRAM_BOT_TOKEN"]}/sendMessage',json={"chat_id":os.environ["TELEGRAM_CHAT_ID"],"parse_mode":"HTML","text":"📦 <b>New Firmware Release</b>\n\n📱 <b>POCO F7 (onyx)</b>\n\nChoose your firmware:","reply_markup":{"inline_keyboard":rows}}).raise_for_status()
          PY

      - name: Save state & commit
        if: steps.check.outputs.has_update == 'true'
        env:
          NEW_STATE: ${{ steps.check.outputs.new_state }}
        run: |
          set -e
          mkdir -p state
          echo "$NEW_STATE" > state/onyx_last.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/onyx_last.txt
          git commit -m "state: onyx -> $NEW_STATE" || exit 0
          git push
