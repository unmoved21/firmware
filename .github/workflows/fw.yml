name: Auto FW (onyx from xmfirmwareupdater page)

on:
  schedule:
    - cron: "30 6 * * *" # her gün 06:30 UTC
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

        - name: Free disk space
  run: |
    echo "Before cleanup:"
    df -h

    sudo rm -rf /usr/share/dotnet
    sudo rm -rf /usr/local/lib/android
    sudo rm -rf /opt/ghc
    sudo rm -rf /usr/local/share/boost
    sudo rm -rf /usr/local/share/powershell
    sudo rm -rf /usr/lib/jvm
    sudo apt-get clean

    echo "After cleanup:"
    df -h

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          set -e
          sudo apt-get update
          sudo apt-get install -y curl
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml xiaomi-flashable-firmware-creator

      - name: Check latest recovery ROM links (onyx)
        id: check
        run: |
          set -e
          python scripts/onyx_check.py >> "$GITHUB_OUTPUT"

      - name: Stop if no update
        if: steps.check.outputs.has_update != 'true'
        run: echo "No new onyx update."

      - name: Build firmware zips (all regions)
        if: steps.check.outputs.has_update == 'true'
        env:
          ROMS_JSON: ${{ steps.check.outputs.roms_json }}
        run: |
          set -e
          mkdir -p out
          python scripts/onyx_build_all.py "$ROMS_JSON" out
          ls -lah out

      - name: Create release & upload assets
        if: steps.check.outputs.has_update == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.check.outputs.release_tag }}
          TITLE: ${{ steps.check.outputs.release_title }}
          NOTES: ${{ steps.check.outputs.release_notes }}
        run: |
          set -e
          gh release create "$TAG" out/*.zip --title "$TITLE" --notes "$NOTES"
          echo "release_url=$(gh release view "$TAG" --json url -q .url)" >> "$GITHUB_OUTPUT"

      - name: Telegram notify (single message)
        if: steps.check.outputs.has_update == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          RELEASE_URL: ${{ steps.check.outputs.release_url }}
          SUMMARY: ${{ steps.check.outputs.summary }}
        run: |
          set -e
          TEXT="✅ onyx FW seti hazir!%0A%0A${SUMMARY}%0A%0AIndirme (tek release):%0A${RELEASE_URL}"
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=false"

      - name: Save state & commit
        if: steps.check.outputs.has_update == 'true'
        env:
          NEW_STATE: ${{ steps.check.outputs.new_state }}
        run: |
          set -e
          mkdir -p state
          echo "$NEW_STATE" > state/onyx_last.txt

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/onyx_last.txt
          git commit -m "state: onyx -> $NEW_STATE" || exit 0
          git push
